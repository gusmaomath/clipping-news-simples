<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clipping News</title>
<style>
  :root{
    --bg:#F7F6F5;--surface:#FFFFFF;--ink:#1B1A19;--muted:#6B6562;--faint:#9A938F;
    --hair:#E7E3E0;--hair2:#F0EDEB;--chip:#F1EDEB;
    --brand:#800000;--brand-d:#5E0000;--brand-bg:#F6E9E9;--on-brand:#FFFFFF;
    --pos:#1E7A3D;--neg:#B42318;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;--serif:Georgia,"Times New Roman",serif;--r:8px;
  }
  [data-theme="dark"]{
    --bg:#161311;--surface:#211C1A;--ink:#F2EEEB;--muted:#B6ADA8;--faint:#857B76;
    --hair:#352D2A;--hair2:#2A2421;--chip:#2A2320;
    --brand:#C76B6B;--brand-d:#E08A8A;--brand-bg:#3A2220;--on-brand:#1B1311;
    --pos:#5FBE82;--neg:#E97A6E;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:15px}
  a{color:inherit;text-decoration:none} button{font-family:inherit}
  .wrap{max-width:820px;margin:0 auto;padding:0 18px}
  .grow{flex:1}.hidden{display:none!important}

  .top{position:sticky;top:0;z-index:30;background:var(--bg);border-bottom:1px solid var(--hair)}
  .top .wrap{display:flex;align-items:center;gap:12px;height:58px;max-width:1140px}
  .topacts{display:flex;align-items:center;gap:8px;margin-left:auto;flex:none}
  .brand{font-weight:800;font-size:20px;letter-spacing:-.4px;display:flex;align-items:center;gap:7px;color:var(--ink)}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--brand)} .brand b{color:var(--brand)}
  .search{position:relative;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--hair);border-radius:999px;padding:8px 14px;min-width:200px;max-width:560px;flex:1 1 auto;transition:border-color .15s,box-shadow .15s}
  .search:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-bg)}
  .search .sicon{flex:none;color:var(--faint);transition:color .15s}
  .search:focus-within .sicon{color:var(--brand)}
  .search input{border:none;outline:none;background:none;flex:1;min-width:0;font-size:14px;color:var(--ink)}
  .search input::placeholder{color:var(--faint)}
  .results{position:absolute;top:46px;left:0;right:0;background:var(--surface);border:1px solid var(--hair);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.15);max-height:60vh;overflow:auto;z-index:40}
  .results .r{padding:10px 13px;border-bottom:1px solid var(--hair2);cursor:pointer}
  .results .r:hover{background:var(--chip)} .results .r b{font-size:14px;display:block}
  .results .r .m{font-size:11.5px;color:var(--faint)}
  .pill,.iconbtn{cursor:pointer;border:1px solid var(--hair);background:var(--surface);color:var(--ink);border-radius:var(--r);padding:8px 12px;font-size:13.5px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .pill:hover,.iconbtn:hover{border-color:var(--faint)}
  .pill.primary{background:var(--brand);border-color:var(--brand);color:var(--on-brand)}
  .pill.primary:hover{background:var(--brand-d);border-color:var(--brand-d)} .pill:disabled{opacity:.55;cursor:wait}
  .helpbtn{cursor:pointer;display:inline-flex;align-items:center;gap:7px;border:1px solid var(--hair);background:var(--surface);color:var(--muted);border-radius:999px;padding:6px 14px 6px 7px;font-size:13.5px;font-weight:500;white-space:nowrap;font-family:inherit;transition:.15s}
  .helpbtn:hover{border-color:var(--brand);color:var(--brand-d);background:var(--brand-bg)}
  .helpbtn .q{display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:50%;background:var(--brand);color:var(--on-brand);font-size:12.5px;font-weight:700;line-height:1}

  .feedlayout{display:flex;align-items:flex-start;max-width:1280px;margin:0 auto}
  .feedmain .wrap{max-width:none;padding:0 22px}
  .sidebar{position:sticky;top:58px;flex:none;width:212px;align-self:flex-start;max-height:calc(100vh - 58px);overflow-y:auto;padding:18px 12px;border-right:1px solid var(--hair);scrollbar-width:thin}
  .sidehd{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);padding:0 13px 9px;font-weight:600}
  .feedmain{flex:1;min-width:0}
  .tabs{display:flex;flex-direction:column;gap:3px}
  .tab{cursor:pointer;border:none;background:none;text-align:left;width:100%;padding:9px 13px;border-radius:8px;font-size:14.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tab:hover{background:var(--chip)} .tab.on{background:var(--brand);color:var(--on-brand);font-weight:600}
  .tab.add{color:var(--brand)}
  @media(max-width:760px){
    .feedlayout{flex-direction:column}
    .sidebar{position:sticky;top:58px;z-index:20;width:auto;max-height:none;border-right:none;border-bottom:1px solid var(--hair);padding:8px 12px;background:var(--bg)}
    .sidehd{display:none}
    .tabs{flex-direction:row;overflow-x:auto;gap:2px}
    .tab{width:auto;flex:none;border-radius:999px;padding:7px 13px}
  }

  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 0 4px}
  .seg{display:inline-flex;border:1px solid var(--hair);border-radius:999px;overflow:hidden;background:var(--surface)}
  .seg button{border:none;background:none;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--brand-bg);color:var(--brand-d);font-weight:600}
  .tin{border:1px solid var(--hair);border-radius:6px;padding:6px 8px;font-size:13px;background:var(--surface);color:var(--ink)}
  .tagdd{position:relative}
  .tagmenu{position:absolute;top:42px;left:0;z-index:25;background:var(--surface);border:1px solid var(--hair);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.18);padding:8px;min-width:210px;max-height:320px;overflow:auto}
  .tagopt{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:13.5px;color:var(--ink);cursor:pointer;white-space:nowrap}
  .tagopt:hover{background:var(--chip)} .tagopt input{accent-color:var(--brand);cursor:pointer}
  .aichip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--brand-d);background:var(--brand-bg);border:1px solid var(--brand);border-radius:999px;padding:5px 12px;cursor:pointer}
  .aichip.busy{cursor:default}
  .dotpulse{width:8px;height:8px;border-radius:50%;background:var(--brand);animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}

  .list{padding:10px 0 70px}
  .list.portal{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:16px}
  .list.portal .selbar{grid-column:1/-1}
  .list.portal .item{flex-direction:column;padding:16px;overflow:hidden;margin:0;height:100%}
  .list.portal .item.feature{grid-column:span 2;grid-row:span 2}
  .list.portal .ibody{display:flex;flex-direction:column;flex:1;min-height:0}
  .list.portal .meta{margin-top:auto;padding-top:8px}
  .list.portal .ttl{font-size:16.5px;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .list.portal .snippet{display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .list.portal .item.feature .ttl{font-size:20px}
  .list.portal .item.feature .pimg{height:200px}
  .list.portal .item.feature .snippet{font-size:15px;-webkit-line-clamp:6;line-clamp:6}
  .pimg{display:block;width:calc(100% + 32px);height:140px;object-fit:cover;margin:-16px -16px 14px;background:var(--chip)}
  .selbar{display:flex;align-items:center;gap:10px;padding:8px 8px;border-bottom:1px solid var(--hair);font-size:13px;color:var(--muted)}
  .selbar .selall{display:inline-flex;align-items:center;gap:7px;cursor:pointer}
  .selbar input[type=checkbox],.selbox{accent-color:var(--brand);cursor:pointer}
  .selcount{font-size:13px;color:var(--faint)}
  .trash{cursor:pointer;border:1px solid var(--hair);background:var(--surface);color:var(--muted);border-radius:8px;padding:6px 12px;font-size:13px;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
  .trash:hover:not(:disabled){border-color:var(--neg);color:var(--neg);background:var(--brand-bg)}
  .trash:disabled{opacity:.45;cursor:default}
  .item{display:flex;gap:12px;align-items:flex-start;padding:16px 18px;margin-bottom:12px;background:var(--surface);border:1px solid var(--hair);border-radius:12px;transition:box-shadow .15s,border-color .15s}
  .item:hover{border-color:var(--faint);box-shadow:0 6px 20px rgba(0,0,0,.08)}
  .item.sel{border-color:var(--brand);background:var(--brand-bg)}
  .selbox{margin-top:3px;width:17px;height:17px;flex:none}
  .ibody{flex:1;min-width:0;cursor:pointer}
  .ttl{font-size:17px;font-weight:600;line-height:1.3;letter-spacing:-.2px}
  .item:hover .ttl{color:var(--brand-d)}
  .badges{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0;align-items:center}
  .badge{background:var(--brand-bg);color:var(--brand-d);font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em}
  .senti{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em}
  .senti.Positivo{background:#E6F4EA;color:#1E7A3D}.senti.Oportunidade{background:#E7F0FF;color:#1F5FB0}
  .senti.Negativo{background:#FBEAE8;color:#B42318}.senti.Risco{background:#FCEFD9;color:#9A6700}
  .senti.Neutro{background:var(--chip);color:var(--muted)}
  [data-theme="dark"] .senti.Positivo{background:#1d3a28;color:#5FBE82}[data-theme="dark"] .senti.Oportunidade{background:#1c2f4a;color:#7fb0f0}
  [data-theme="dark"] .senti.Negativo{background:#3a201d;color:#E97A6E}[data-theme="dark"] .senti.Risco{background:#3a2f18;color:#e0b257}
  .score{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--chip);color:var(--muted)}
  .score.hi{background:var(--brand);color:var(--on-brand)}
  .snippet{color:var(--ink);opacity:.82;font-size:15px;line-height:1.6;margin:5px 0 9px}
  .meta{display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:12.5px;color:var(--faint)}
  .meta .src{color:var(--muted);font-weight:600}.meta .sep{opacity:.5}
  .meta .ler{color:var(--brand-d);font-weight:600}
  .others{margin-top:9px;border-left:2px solid var(--hair);padding-left:12px;display:none}
  .others.open{display:block}.others .o{padding:5px 0;font-size:13px}.others .o .s{color:var(--brand-d);font-weight:600;margin-right:6px}
  .more{cursor:pointer;color:var(--brand-d);font-weight:600;font-size:12.5px;background:none;border:none;padding:0;margin-top:6px}
  .empty{text-align:center;color:var(--muted);padding:60px 16px}
  .pager{display:flex;align-items:center;justify-content:center;gap:14px;padding:20px 0 44px}
  .pager .pginfo{font-size:13px;color:var(--faint)}
  .list.portal .pager{grid-column:1/-1}
  .status{text-align:center;color:var(--faint);font-size:12.5px;padding:14px 0}

  .overlay{position:fixed;inset:0;z-index:50;background:rgba(10,8,8,.6);display:flex;align-items:flex-start;justify-content:center;padding:5vh 16px;overflow-y:auto}
  .modal{background:var(--surface);max-width:700px;width:100%;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden;animation:pop .15s ease}
  .modal.wide{max-width:960px;min-height:84vh}
  .modal.wide .exsum{max-height:none}
  @keyframes pop{from{transform:translateY(8px);opacity:.6}to{transform:none;opacity:1}}
  .mhead{display:flex;justify-content:flex-end;padding:14px 16px 0}
  .mclose{cursor:pointer;border:none;background:var(--chip);color:var(--muted);width:30px;height:30px;border-radius:50%;font-size:16px}
  .mtitle{font-family:var(--serif);font-size:24px;line-height:1.25;font-weight:700;padding:4px 22px 0}
  .mmeta{font-size:12.5px;color:var(--faint);padding:8px 22px 0;display:flex;gap:8px;flex-wrap:wrap}
  .mmeta .src{color:var(--muted);font-weight:600}
  .mimg{width:100%;max-height:300px;object-fit:cover;margin-top:14px;background:var(--chip)}
  .mbody{padding:16px 22px 4px;font-size:16px;line-height:1.7;color:var(--ink)}
  .mbody p{margin:0 0 14px}
  .mfoot{padding:10px 22px 20px;border-top:1px solid var(--hair2);margin-top:8px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center}
  .loading{padding:46px 20px;text-align:center;color:var(--muted)}
  .spin{width:26px;height:26px;border:3px solid var(--hair);border-top-color:var(--brand);border-radius:50%;animation:rot .8s linear infinite;margin:0 auto 12px}
  @keyframes rot{to{transform:rotate(360deg)}}
  .exsum{padding:18px 22px}.exsum h4{margin:14px 0 6px;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
  .exitem{padding:9px 0;border-bottom:1px solid var(--hair2)}.exitem b{font-size:14.5px}
  .exitem .x{font-size:12px;color:var(--faint)}
  .note{background:var(--brand-bg);color:var(--brand-d);border-radius:8px;padding:10px 12px;font-size:13px;margin:0 0 8px}

  /* Config */
  .cfgtop{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:16px 0 4px}
  .tp{cursor:pointer;border:1px solid var(--hair);background:var(--surface);padding:8px 13px;border-radius:999px;font-size:13.5px;color:var(--muted)}
  .tp.on{background:var(--brand);color:var(--on-brand);border-color:var(--brand)} .tp.add{color:var(--brand);border-color:var(--brand)}
  .card{background:var(--surface);border:1px solid var(--hair);border-radius:10px;padding:18px;margin-top:14px}
  .section{margin-top:22px;padding-top:18px;border-top:1px solid var(--hair2)} .section:first-child{margin-top:0;padding-top:0;border-top:none}
  .card h3{font-size:16px;margin:0 0 3px}.card .hint{color:var(--muted);font-size:13px;margin:0 0 14px}
  .form{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
  .field input,.field select,.field textarea{border:1px solid var(--hair);border-radius:6px;padding:9px 10px;font-size:14px;background:var(--surface);color:var(--ink);outline:none;font-family:inherit}
  .field textarea{resize:vertical;line-height:1.5;min-height:44px}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
  .exsum code,.hint code{background:var(--chip);color:var(--brand-d);padding:1px 6px;border-radius:4px;font-size:12.5px}
  .promptbox{width:100%;min-height:240px;border:1px solid var(--hair);border-radius:8px;padding:12px;font-size:13px;font-family:var(--sans);line-height:1.55;background:var(--bg);color:var(--ink);resize:vertical;outline:none}
  .promptbox:focus{border-color:var(--brand)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 2px;border-bottom:1px solid var(--hair2)}
  .row .info b{font-size:14px}.row .info .sub{font-size:12px;color:var(--faint);word-break:break-all}
  .row .acts{display:flex;gap:6px;align-items:center}
  .kind{font-size:10.5px;padding:2px 7px;border-radius:4px;background:var(--chip);color:var(--muted);text-transform:uppercase}
  .mini{cursor:pointer;border:1px solid var(--hair);background:var(--surface);color:var(--muted);border-radius:6px;padding:5px 9px;font-size:12px}
  .mini:hover{border-color:var(--faint)}.mini.danger:hover{color:var(--neg);border-color:var(--neg)}
  .mini.on{color:var(--brand-d);border-color:var(--brand);background:var(--brand-bg)}
  @media(max-width:600px){.top .wrap{height:auto;flex-wrap:wrap;padding:10px 18px}.ttl{font-size:16px}.mtitle{font-size:21px}}
</style>
</head>
<body>

<div class="top"><div class="wrap">
  <a class="brand" href="#" onclick="goFeed();return false"><span class="dot"></span>Clipping <b>News</b></a>
  <div class="search">
    <svg class="sicon" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
    <input id="gq" placeholder="Buscar em todas as notícias..." oninput="globalSearch()" onfocus="globalSearch()">
    <div class="results hidden" id="results"></div>
  </div>
  <div class="topacts">
    <button class="helpbtn" onclick="showHelp()" title="Como usar"><span class="q">?</span>Como usar</button>
    <button class="iconbtn" id="themeBtn" onclick="toggleTheme()" title="Tema">◐</button>
    <button class="pill primary" id="collectBtn" onclick="collectNow()">Coletar</button>
    <button class="iconbtn" onclick="showView('config')" title="Configurações">⚙</button>
  </div>
</div></div>

<section id="view-feed">
  <div class="feedlayout">
    <aside class="sidebar"><div class="sidehd">Setores</div><div class="tabs" id="tabs"></div></aside>
    <div class="feedmain"><div class="wrap">
      <div id="toolbar"></div>
      <div class="list" id="feed"></div>
      <div class="status" id="status"></div>
    </div></div>
  </div>
</section>

<section id="view-config" class="hidden"><div class="wrap">
  <div class="cfgtop" id="cfgtop"></div>
  <div id="cfgbody"></div>
  <div style="padding:18px 0"><button class="iconbtn" onclick="showView('feed')">← Voltar ao feed</button></div>
</div></section>

<div class="overlay hidden" id="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal"></div></div>

<script>
let TABS=[], activeTab="", DATA={clusters:[]}, ART={}, cfgSel=null;
let timeMode="all", dateVal="", fromVal="", toVal="", selTags=new Set(), selClusters=new Set(), editMode=false;
let viewMode=(()=>{try{return localStorage.getItem("cn-view")||"list";}catch(e){return "list";}})();
let page=1, tagMenuOpen=false, aiBusy=false;
function pageSize(){return viewMode==="portal"?20:15;}
const jget=async u=>(await fetch(u)).json();
const jsend=async(u,m,b)=>(await fetch(u,{method:m,headers:{"Content-Type":"application/json"},body:b?JSON.stringify(b):null})).json();
const esc=s=>{const d=document.createElement("div");d.textContent=s==null?"":s;return d.innerHTML;};

// ---- tema ----
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);
  try{localStorage.setItem("cn-theme",t);}catch(e){}
  document.getElementById("themeBtn").textContent=t==="dark"?"☀":"◐";}
function toggleTheme(){applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");}
(function(){let t="light";try{t=localStorage.getItem("cn-theme")||"light";}catch(e){}applyTheme(t);})();

function goFeed(){showView("feed");}
function showView(v){
  document.getElementById("view-feed").classList.toggle("hidden",v!=="feed");
  document.getElementById("view-config").classList.toggle("hidden",v!=="config");
  if(v==="config") loadConfig(); else loadFeed();
}
function timeAgo(iso){if(!iso)return"";try{const d=new Date(iso),s=(Date.now()-d)/1000;
  if(s<60)return"agora";if(s<3600)return"há "+Math.floor(s/60)+" min";
  if(s<86400)return"há "+Math.floor(s/3600)+" h";if(s<2592000)return"há "+Math.floor(s/86400)+" d";
  return d.toLocaleDateString("pt-BR");}catch(e){return"";}}

// ---- FEED ----
function feedQuery(){
  const p=new URLSearchParams();
  p.set("tab",activeTab);
  if(timeMode==="1h")p.set("since_hours","1");
  else if(timeMode==="2h")p.set("since_hours","2");
  else if(timeMode==="date"&&dateVal)p.set("date",dateVal);
  else if(timeMode==="range"){if(fromVal)p.set("dt_from",fromVal);if(toVal)p.set("dt_to",toVal);}
  if(selTags.size)p.set("tags",[...selTags].join(","));
  if(viewMode==="portal")p.set("sort","score");
  p.set("page",page); p.set("per_page",pageSize());
  return p.toString();
}
async function loadFeed(){
  TABS=await jget("/api/tabs"); renderTabs();
  if(TABS.length===0){
    document.getElementById("toolbar").innerHTML="";
    document.getElementById("feed").innerHTML=`<div class="empty">Nenhuma aba ainda.<br><br>
      <button class="pill primary" onclick="showView('config')">Criar minha primeira aba</button></div>`;
    document.getElementById("status").textContent="";
    return;
  }
  DATA=await jget("/api/articles?"+feedQuery());
  selClusters=new Set();   // seleção não persiste entre recargas (igual caixa de e-mail)
  ART={}; (DATA.clusters||[]).forEach(c=>{ART[c.lead.id]=c.lead;(c.others||[]).forEach(o=>ART[o.id]=o);});
  renderToolbar(); renderFeed();
}
function renderTabs(){
  if(TABS.length===0){document.getElementById("tabs").innerHTML=
    `<button class="tab add" onclick="showView('config')">+ criar aba</button>`;return;}

async function analyzeNow(){

function card(c,i){
  const a=c.lead;
  const senti=a.sentiment?`<span class="senti ${esc(a.sentiment)}">${esc(a.sentiment)}</span>`:"";
  const score=(a.score>0)?`<span class="score ${a.score>=70?"hi":""}" title="Score de relevância (IA)">${Math.round(a.score)}</span>`:"";
  const badges=senti+score+(a.tags||[]).map(t=>`<span class="badge">${esc(t)}</span>`).join("");
  const ttl=a.title_disp||a.title;
  const snip=a.snippet_disp||a.snippet;
  const img=(viewMode==="portal"&&a.image_url)?`<img class="pimg" src="${esc(a.image_url)}" loading="lazy" onerror="this.remove()">`:"";
  let others="";
  if(c.size>1){
    const list=(c.others||[]).map(o=>`<div class="o"><span class="s">${esc(o.source_name||"")}</span>
      <a onclick="event.stopPropagation();openArticle(${o.id})" style="cursor:pointer">${esc(o.title)}</a></div>`).join("");
    others=`<button class="more" onclick="event.stopPropagation();toggleOthers(${i})">Ver outras ${c.size-1} fonte(s) ▾</button>
      <div class="others" id="oth-${i}">${list}</div>`;
  }
  const on=selClusters.has(i);
  const feat=(viewMode==="portal" && i===0 && (DATA.clusters||[]).length>=4) ? "feature" : "";
  return `<div class="item ${on?"sel":""} ${feat}" id="item-${i}">
    ${editMode?`<input type="checkbox" class="selbox" ${on?"checked":""} title="Selecionar" onclick="event.stopPropagation();toggleSel(${i},this.checked)">`:""}
    <div class="ibody" onclick="openArticle(${a.id})">
    ${img}
    <div class="ttl">${esc(ttl)}</div>
    ${badges?`<div class="badges">${badges}</div>`:""}
    ${snip?`<div class="snippet">${esc(snip)}</div>`:""}
    <div class="meta"><span class="src">${esc(a.source_name||"")}</span><span class="sep">·</span>
      <span>${timeAgo(a.published_at)}</span>
      ${c.size>1?`<span class="sep">·</span><span>${c.sources.length} fontes</span>`:""}
      <span class="sep">·</span>
      <a class="ler" href="${esc(a.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">site ↗</a></div>
    ${others}</div></div>`;
}
function selBar(total){
  return `<div class="selbar">
    <label class="selall"><input type="checkbox" id="selAll" onclick="toggleAll(this.checked)"> Selecionar todas</label>
    <span class="grow"></span>
    <span id="selcount" class="selcount"></span>
    <button class="trash" id="trashBtn" onclick="deleteSelected()" disabled title="Apagar selecionadas">🗑 Apagar</button>
  </div>`;
}
function pager(){
  const pages=DATA.pages||1, cur=DATA.page||1;
  if(pages<=1) return "";
  return `<div class="pager">
    <button class="pill" ${cur<=1?"disabled":""} onclick="gotoPage(${cur-1})">← Anterior</button>
    <span class="pginfo">Página ${cur} de ${pages}</span>
    <button class="pill" ${cur>=pages?"disabled":""} onclick="gotoPage(${cur+1})">Próxima →</button>
  </div>`;
}
function renderFeed(){
  page=DATA.page||1;                         // alinha com o clamp do servidor
  const cl=DATA.clusters||[];
  const feed=document.getElementById("feed");
  feed.className="list"+(viewMode==="portal"?" portal":"");
  feed.innerHTML = cl.length? (editMode?selBar(cl.length):"")+cl.map((c,i)=>card(c,i)).join("")+pager()
    : `<div class="empty">Nenhuma notícia com os filtros atuais.<br>Clique em <b>Coletar</b> ou ajuste os filtros.</div>`;
  if(editMode) updateSelBar();
  const nm=activeTab===""?"Todas":(TABS.find(t=>t.id==activeTab)||{}).name;
  const tot=DATA.total!=null?DATA.total:cl.length;
  document.getElementById("status").textContent=`${tot} assunto(s) · ${nm}${DATA.pages>1?` · pág. ${DATA.page}/${DATA.pages}`:""}`;

function toggleOthers(i){document.getElementById("oth-"+i).classList.toggle("open");}

// ---- seleção / exclusão em massa (estilo caixa de e-mail) ----
function toggleEdit(){editMode=!editMode; if(!editMode) selClusters=new Set(); renderToolbar(); renderFeed();}
function toggleSel(i,checked){
  if(checked)selClusters.add(i);else selClusters.delete(i);
  const el=document.getElementById("item-"+i); if(el) el.classList.toggle("sel",checked);
  updateSelBar();
}
function toggleAll(checked){
  const cl=DATA.clusters||[];
  selClusters = checked ? new Set(cl.map((_,i)=>i)) : new Set();
  renderFeed();
}
function updateSelBar(){
  const total=(DATA.clusters||[]).length, n=selClusters.size;
  const cnt=document.getElementById("selcount"); if(cnt) cnt.textContent=n?`${n} selecionada(s)`:"";
  const tb=document.getElementById("trashBtn"); if(tb) tb.disabled=!n;
  const sa=document.getElementById("selAll"); if(sa){sa.checked=n>0&&n===total; sa.indeterminate=n>0&&n<total;}
}
async function deleteSelected(){
  const idxs=[...selClusters]; if(!idxs.length) return;
  const ids=[];
  idxs.forEach(i=>{const c=(DATA.clusters||[])[i]; if(!c)return; ids.push(c.lead.id); (c.others||[]).forEach(o=>ids.push(o.id));});
  if(!ids.length) return;
  if(activeTab===""){
    if(!confirm(`Apagar ${idxs.length} notícia(s) do banco?\nIsso remove ${ids.length} item(ns) definitivamente.`)) return;
    const r=await jsend("/api/articles/delete","POST",{ids});
    await loadFeed();
    document.getElementById("status").textContent=`${(r&&r.removed)||0} item(ns) apagado(s).`;
  }else{
    if(!confirm(`Enviar ${idxs.length} notícia(s) para a lixeira desta aba?\nElas somem desta aba e não voltam a ser exibidas/reprocessadas aqui.`)) return;
    const r=await jsend(`/api/tabs/${activeTab}/spam`,"POST",{ids});
    await loadFeed();
    document.getElementById("status").textContent=`${(r&&r.added)||0} enviada(s) para a lixeira da aba.`;
  }
}

// ---- Como usar (ajuda + prompt para IA) ----
const AI_PROMPT=`Você é um especialista em monitoramento de imprensa (clipping) e vai montar a configuração completa de uma SEÇÃO (aba) de um painel de notícias com IA.

==== O QUE EU QUERO ACOMPANHAR (preencha com o MÁXIMO de detalhe) ====
<Descreva aqui:
 • o tema (setor, empresa, produto, concorrentes, região);
 • o que é relevante e o que é ruído para mim;
 • o meu objetivo (achar oportunidades, monitorar riscos, acompanhar concorrência...);
 • o meu papel/persona (ex.: analista de investimentos, jornalista, gestor de produto).>

Se faltar contexto para gerar uma boa configuração, FAÇA PERGUNTAS antes de responder.
Depois capriche: seja específico, use nomes próprios (empresas, pessoas, produtos, eventos).

==== CAMPOS — o que é OBRIGATÓRIO x OPCIONAL ====
[OBRIGATÓRIO] NOME    — nome curto da aba.
[OBRIGATÓRIO] PERSONA — 2 a 4 frases dizendo quem sou eu e qual o critério de análise. A IA usa isto para julgar relevância, dar o score e classificar o sentimento. Quanto mais detalhada, melhor.
[OBRIGATÓRIO] IDIOMA  — idioma de saída dos títulos/resumos (ex.: pt-BR, en, es).
[opcional]   PREFERENCIAS — palavras que INCLUEM a notícia (filtro grosso). Vazio = aceita tudo.
[opcional]   BLACKLIST    — palavras que DESCARTAM a notícia (ruído).
[opcional]   TAGS         — subtemas, cada um com palavras-chave.
[opcional]   BUSCAS_GOOGLE_NEWS — termos pesquisados no Google News só desta aba.
[opcional]   SITES_RSS    — portais com feed RSS que cobrem o tema.

==== RESPONDA EXATAMENTE NESTE FORMATO (sem markdown, sem comentários) ====
NOME: <nome curto>

PERSONA: <2 a 4 frases descrevendo quem sou e o critério de análise>

IDIOMA: pt-BR

PREFERENCIAS: palavra1, palavra2, ...   (ou: nenhum)

BLACKLIST: palavra1, palavra2, ...   (ou: nenhum)

TAGS:
<Nome da Tag 1>: palavra1, palavra2, palavra3
<Nome da Tag 2>: palavra1, palavra2, palavra3

BUSCAS_GOOGLE_NEWS:
<termo 1, ex.: "Petrobras dividendos">
<termo 2>

SITES_RSS:
<Nome do site | URL do feed RSS>
<Nome do site | URL do feed RSS>

==== REGRAS ====
- PERSONA detalhada e específica melhora MUITO o score e o sentimento — não economize.
- PREFERENCIAS: 6 a 15 termos. BLACKLIST: ruídos comuns (promoção, cupom, sorteio, horóscopo, apostas) + ruídos do tema.
- TAGS: 4 a 8, cada uma com 3 a 8 palavras-chave. BUSCAS_GOOGLE_NEWS: 4 a 10, bem específicas.
- SITES_RSS: 4 a 8 portais confiáveis com a URL do RSS; se não tiver certeza da URL exata, indique o site e avise que devo confirmar o feed.
- Campos opcionais sem valor: escreva "nenhum". Não escreva nada fora do formato acima.`;

async function loadConfig(){
  TABS=await jget("/api/tabs");
  if(cfgSel===null||(cfgSel!=="fontes"&&cfgSel!=="ia"&&!TABS.find(t=>t.id==cfgSel))) cfgSel=TABS.length?TABS[0].id:"fontes";
  renderCfgTop(); renderCfgBody();
}
function renderCfgTop(){
  let h=TABS.map(t=>`<button class="tp ${cfgSel==t.id?"on":""}" onclick="cfgPick('${t.id}')">${esc(t.name)}</button>`).join("");
  h+=`<button class="tp add" onclick="newTab()">+ Nova aba</button>
    <button class="tp" onclick="importTabDialog()" title="Importar configuração de aba (JSON)">⬆ Importar</button>
    <div class="grow"></div>
    <button class="tp ${cfgSel==='ia'?'on':''}" onclick="cfgPick('ia')">🤖 IA</button>
    <button class="tp ${cfgSel==='fontes'?'on':''}" onclick="cfgPick('fontes')">⚙ Fontes</button>`;

function cfgPick(id){cfgSel=id;renderCfgTop();renderCfgBody();}
async function newTab(){const r=await jsend("/api/tabs","POST",{name:"Nova aba"});TABS=await jget("/api/tabs");cfgSel=r.id;renderCfgTop();renderCfgBody();}

async function saveTab(id){const name=document.getElementById("t-name").value.trim();if(!name)return alert("Nome obrigatório.");
  await jsend(`/api/tabs/${id}`,"PUT",{name,preferences:document.getElementById("t-pref").value.trim(),
    blacklist:document.getElementById("t-bl").value.trim(),
    persona:document.getElementById("t-persona").value.trim(),lang:document.getElementById("t-lang").value});
  TABS=await jget("/api/tabs");renderCfgTop();renderCfgBody();}
async function moveTab(id,d){await jsend(`/api/tabs/${id}/move/${d}`,"POST");TABS=await jget("/api/tabs");renderCfgTop();renderCfgBody();}
async function exportTab(id){
  const data=await jget(`/api/tabs/${id}/export`);
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=url;a.download="aba-"+(data.name||"config").trim().replace(/\s+/g,"-").toLowerCase()+".json";a.click();
  URL.revokeObjectURL(url);
}
function importTabDialog(){
  showOverlay(`<div class="mhead"><button class="mclose" onclick="closeModal()">✕</button></div>
    <div class="mtitle">Importar configuração de aba</div>
    <div class="exsum">
      <p>Cole o JSON exportado de outra aba (ou escolha um arquivo). Cria uma nova aba com preferências, blacklist, persona, idioma, tags e buscas.</p>
      <input type="file" accept="application/json,.json" onchange="impFile(event)" style="margin-bottom:8px">
      <textarea id="imp-json" class="promptbox" placeholder='{"name":"...","persona":"...","tags":[...],"searches":[...]}'></textarea>
      <div style="margin-top:10px"><button class="pill primary" onclick="doImportTab()">Importar</button></div>
    </div>`);
}
function impFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{document.getElementById("imp-json").value=r.result;};r.readAsText(f);}
async function doImportTab(){
  let data; try{ data=JSON.parse(document.getElementById("imp-json").value); }catch(e){ return alert("JSON inválido."); }
  if(!data||!data.name) return alert("JSON precisa ter ao menos um campo 'name'.");
  const r=await jsend("/api/tabs/import","POST",data);
  closeModal(); TABS=await jget("/api/tabs"); cfgSel=r.id; renderCfgTop(); renderCfgBody();
}
async function delTab(id){
  if(!confirm("Excluir a aba e suas tags?"))return;
  const purge=confirm("Apagar também as notícias EXCLUSIVAS desta aba (que não aparecem em nenhuma outra aba)?\n\nOK = apagar essas notícias · Cancelar = manter as notícias");
  const r=await jsend(`/api/tabs/${id}?purge=${purge?1:0}`,"DELETE");
  cfgSel=null;loadConfig();
  if(purge) alert(`Aba excluída. ${(r&&r.removed_articles)||0} notícia(s) exclusiva(s) removida(s).`);
}

async function loadTags(tid){
  const T=await jget(`/api/tags?tab_id=${tid}`);
  document.getElementById("tags").innerHTML=T.length?T.map(g=>`
    <div class="row"><div class="info"><b>${esc(g.name)}</b><div class="sub">${esc(g.keywords||"—")}</div></div>
    <div class="acts"><button class="mini danger" onclick="delTag(${g.id},${tid})">remover</button></div></div>`).join("")
    :`<p class="hint">Nenhuma tag ainda.</p>`;
}
async function addTag(tid){const name=document.getElementById("g-name").value.trim(),keywords=document.getElementById("g-kw").value.trim();
  if(!name)return alert("Nome da tag obrigatório.");
  await jsend("/api/tags","POST",{tab_id:tid,name,keywords});document.getElementById("g-name").value="";document.getElementById("g-kw").value="";loadTags(tid);}
const delTag=(id,tid)=>fetch(`/api/tags/${id}`,{method:"DELETE"}).then(()=>loadTags(tid));
async function bulkAddTags(tid){
  const box=document.getElementById("g-bulk");
  const skip=new Set(["tags","nome","preferencias","preferências","blacklist"]);
  const lines=box.value.split("\n");
  let added=0;
  for(const raw of lines){
    const line=raw.trim(); if(!line) continue;
    const i=line.indexOf(":"); if(i<0) continue;
    const name=line.slice(0,i).replace(/^[-*•]\s*/,"").trim();
    const keywords=line.slice(i+1).trim();
    if(!name||skip.has(name.toLowerCase())) continue;
    await jsend("/api/tags","POST",{tab_id:tid,name,keywords});
    added++;
  }
  box.value="";
  loadTags(tid);
  if(!added) alert("Nada importado. Use o formato 'Nome: palavra1, palavra2' (uma tag por linha).");
}

async function loadSearches(tid){
  const S=await jget(`/api/tabs/${tid}/searches`);
  document.getElementById("searches").innerHTML=S.length?S.map(s=>`
    <div class="row"><div class="info"><b>🔎 ${esc(s.term)}</b><div class="sub">busca no Google News</div></div>
    <div class="acts"><button class="mini danger" onclick="delSearch(${s.id},${tid})">remover</button></div></div>`).join("")
    :`<p class="hint">Nenhuma busca ainda.</p>`;
}
async function addSearch(tid){const term=document.getElementById("q-term").value.trim();
  if(!term)return alert("Digite um termo de busca.");
  await jsend(`/api/tabs/${tid}/searches`,"POST",{term});document.getElementById("q-term").value="";loadSearches(tid);}
async function bulkAddSearches(tid){
  const box=document.getElementById("q-bulk");let added=0;
  for(const raw of box.value.split("\n")){const term=raw.trim();if(!term||term.startsWith("#"))continue;
    await jsend(`/api/tabs/${tid}/searches`,"POST",{term});added++;}
  box.value="";loadSearches(tid);
  if(!added)alert("Nada importado. Uma busca por linha.");
}
const delSearch=(id,tid)=>fetch(`/api/searches/${id}`,{method:"DELETE"}).then(()=>loadSearches(tid));

async function renderSourcesCfg(){
  document.getElementById("cfgbody").innerHTML=`
  <div class="card"><div class="section"><h3>Sites (RSS)</h3>
    <p class="hint">Sites com feed <b>RSS</b> — valem para <b>todas</b> as abas. As buscas do Google News agora ficam dentro de cada aba.</p>
    <div class="form">
      <div class="field" style="flex:1;min-width:140px"><label>Nome do site</label><input id="s-name" placeholder="Ex.: InfoMoney"></div>
      <div class="field" style="flex:2;min-width:200px"><label>URL do RSS</label><input id="s-value" placeholder="https://site.com/feed/"></div>
      <button class="pill primary" onclick="addSource()">Adicionar</button>
    </div>
    <div class="form" style="border-top:1px solid var(--hair2);padding-top:14px">
      <div class="field" style="min-width:100%"><label>Importar vários sites (uma por linha → <b>Nome | URL do RSS</b>)</label>
        <textarea id="s-bulk" rows="5" placeholder="InfoMoney | https://www.infomoney.com.br/feed/&#10;G1 Economia | https://g1.globo.com/rss/g1/economia/&#10;https://valor.globo.com/rss"></textarea></div>
      <button class="pill primary" onclick="bulkAddSources()">Importar sites</button>
    </div>
    <div id="sources"></div></div></div>`;
  loadSources();
}
async function loadSources(){
  const S=await jget("/api/sources");
  document.getElementById("sources").innerHTML=S.length?S.map(s=>`
    <div class="row"><div class="info"><b>${esc(s.name)}</b><div class="sub">${esc(s.value)}</div></div>
    <div class="acts"><span class="kind">${esc(s.type.replace("_"," "))}</span>
      <button class="mini ${s.active?"on":""}" onclick="toggleSrc(${s.id},${s.active?0:1})">${s.active?"ativa":"pausada"}</button>
      <button class="mini danger" onclick="delSrc(${s.id})">remover</button></div></div>`).join("")
    :`<p class="hint">Nenhuma fonte ainda.</p>`;
}
async function addSource(){const name=document.getElementById("s-name").value.trim(),value=document.getElementById("s-value").value.trim();
  if(!name||!value)return alert("Preencha nome e URL do RSS.");
  if(!/^https?:\/\//i.test(value))return alert("A URL do RSS precisa começar com http(s).");
  const r=await jsend("/api/sources","POST",{name,type:"rss",value});
  if(!r||!r.id)return alert(r&&r.detail?r.detail:"Não foi possível adicionar.");
  document.getElementById("s-name").value="";document.getElementById("s-value").value="";loadSources();}
function srcNameFrom(v){try{return new URL(v).hostname.replace(/^www\./,"");}catch(e){return v.slice(0,40);}}
async function bulkAddSources(){
  const box=document.getElementById("s-bulk");
  let added=0,skipped=0,dup=0;
  for(const raw of box.value.split("\n")){
    const line=raw.trim(); if(!line||line.startsWith("#")) continue;
    const parts=line.split("|").map(s=>s.trim());
    let name,value;
    if(parts.length>=3 && /^(rss|google_news)$/i.test(parts[1])){ name=parts[0]; value=parts.slice(2).join("|").trim(); }
    else if(parts.length>=2){ name=parts[0]; value=parts.slice(1).join("|").trim(); }
    else { value=parts[0]; name=srcNameFrom(value); }
    if(!/^https?:\/\//i.test(value||"")){ skipped++; continue; }  // só RSS (URL); termos vão nas abas
    if(!name) name=srcNameFrom(value);
    const r=await jsend("/api/sources","POST",{name,type:"rss",value});
    if(r&&r.id) added++; else dup++;
  }
  box.value="";
  loadSources();
  if(!added&&!dup) alert("Nada importado. Use 'Nome | https://site/feed' (uma URL de RSS por linha).");
  else alert(`${added} site(s) importado(s).`+(dup?` ${dup} já existiam (ignorados).`:"")+(skipped?` ${skipped} sem URL ignorada(s).`:""));
}
const toggleSrc=(id,a)=>jsend(`/api/sources/${id}`,"PATCH",{active:!!a}).then(loadSources);
const delSrc=id=>fetch(`/api/sources/${id}`,{method:"DELETE"}).then(loadSources);

const AI_PROVIDERS={

  gemini:{label:"Google (Gemini)", models:["gemini-2.0-flash","gemini-1.5-flash","gemini-1.5-pro"],
    keyUrl:"https://aistudio.google.com/apikey", keyHint:"AIza...",
    note:"Sem SDK extra (via REST). Pegue a chave grátis em aistudio.google.com → Get API key."},

async function renderAiCfg(){
  let c; try{ c=await jget("/api/ai-config"); }catch(e){ c={}; }
  const prov=AI_PROVIDERS[c.provider]?c.provider:"anthropic";
  document.getElementById("cfgbody").innerHTML=`
  <div class="card"><div class="section"><h3>Inteligência Artificial</h3>
    <p class="hint">A IA lê cada notícia e, guiada pela <b>persona</b> da aba, decide relevância, gera um <b>score</b>, uma tag de <b>sentimento</b> e traduz título/resumo. Arquitetura modular — escolha Claude, GPT, Gemini ou nenhum.</p>
    <p class="note">Motor ativo: <b>${esc(c.active||"?")}</b>${c.pending?` · ${c.pending} notícia(s) na fila`:""}.
      ${c.has_key?"Chave configurada.":"Sem chave válida = modo heurístico (offline)."}</p>
    <div class="form">
      <div class="field" style="min-width:200px"><label>Provedor</label>
        <select id="ai-provider" onchange="aiProvChange()">${Object.entries(AI_PROVIDERS).map(([k,v])=>`<option value="${k}" ${prov===k?"selected":""}>${v.label}</option>`).join("")}</select></div>
      <div class="field" style="flex:1;min-width:200px"><label>Modelo</label>
        <input id="ai-model" list="ai-models" value="${esc(c.model||"")}" placeholder="modelo"></div>
      <datalist id="ai-models"></datalist>
      <div class="field" style="min-width:100%"><label>API key (deixe vazio para manter a atual)</label>
        <input id="ai-key" type="password" autocomplete="off" placeholder=""></div>
      <button class="pill primary" onclick="saveAiCfg()">Salvar</button>
      <button class="pill" onclick="testAi()" id="ai-test-btn">🔌 Testar conexão</button>
      <button class="pill" onclick="analyzeNow()">✨ Analisar fila agora</button>
      <button class="pill" onclick="reprocessAll()" title="Re-extrai o texto inteiro e refaz todos os resumos">♻ Reprocessar todas</button>
    </div>
    <p class="note hidden" id="ai-test-out"></p>
    <p class="hint" id="ai-prov-hint" style="margin-top:4px"></p>
  </div></div>`;
  aiProvChange(true);
}
function aiProvChange(keepModel){
  const k=document.getElementById("ai-provider").value, v=AI_PROVIDERS[k];
  document.getElementById("ai-models").innerHTML=(v.models||[]).map(m=>`<option value="${m}">`).join("");
  const mi=document.getElementById("ai-model");
  if(!keepModel||!mi.value) mi.value=v.models[0]||"";
  mi.disabled=(k==="heuristic");
  document.getElementById("ai-key").placeholder=v.keyHint||"(não precisa de chave)";
  document.getElementById("ai-key").disabled=(k==="heuristic");
  document.getElementById("ai-prov-hint").innerHTML=
    (v.note||"")+(v.keyUrl?` <a href="${v.keyUrl}" target="_blank" rel="noopener" style="color:var(--brand-d);font-weight:600">Obter chave ↗</a>`:"");

async function saveAiCfg(){
  const r=await jsend("/api/ai-config","PUT",{
    provider:document.getElementById("ai-provider").value,
    model:document.getElementById("ai-model").value.trim(),
    api_key:document.getElementById("ai-key").value});
  alert("Configuração de IA salva. Motor ativo: "+(r.active||"?"));
  renderAiCfg();
}
async function reprocessAll(){
  if(!confirm("Recolocar TODAS as notícias na fila para re-extrair o texto inteiro e refazer os resumos?\nPode levar alguns minutos (clique em ✨ Analisar quantas vezes precisar até a fila zerar)."))return;
  const r=await jsend("/api/reprocess","POST");
  alert(`${r.requeued} notícia(s) na fila. Clique em ✨ Analisar para processar (em lotes).`);
  renderAiCfg();
}
async function testAi(){
  const b=document.getElementById("ai-test-btn"),out=document.getElementById("ai-test-out");
  b.disabled=true;b.textContent="Testando...";
  // salva antes de testar, para usar provedor/modelo/chave atuais do formulário
  await jsend("/api/ai-config","PUT",{provider:document.getElementById("ai-provider").value,
    model:document.getElementById("ai-model").value.trim(),api_key:document.getElementById("ai-key").value});
  let r; try{ r=await jsend("/api/ai-test","POST"); }catch(e){ r={ok:false,message:"falha na requisição"}; }
  out.classList.remove("hidden");
  out.style.cssText=`margin-top:8px;background:${r.ok?"var(--brand-bg)":"#FBEAE8"};color:${r.ok?"var(--brand-d)":"#B42318"}`;
  out.innerHTML=`${r.ok?"✅":"⚠️"} <b>${esc(r.engine||"?")} · ${esc(r.model||"?")}</b> — ${esc(r.message||"")}`;
  b.disabled=false;b.textContent="🔌 Testar conexão";
  document.getElementById("ai-key").value="";   // não reexibe a chave
}
